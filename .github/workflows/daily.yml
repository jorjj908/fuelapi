name: Daily fuel email

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm start
        env:
          FUEL_CLIENT_ID: ${{ secrets.FUEL_CLIENT_ID }}
          FUEL_CLIENT_SECRET: ${{ secrets.FUEL_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
